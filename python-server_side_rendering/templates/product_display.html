<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
</head>
<body>
    {% include 'header.html' %}
    {% if error %}
    <p>{{ error }} </p>
    {% else %}
    <table>
        <thead>
            <th scope="col">Name</th>
            <th scope="col">Category</th>
            <th scope="col">Price</th>
        </thead>
        <tbody>
            {% for product in data %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.category }}</td>
                <td>{{ product.price }}</td>
            </tr>
            {% endfor %}
            
        </tbody>
    </table>
    {% endif %}
    {% include 'footer.html' %}
</body>
</html>
